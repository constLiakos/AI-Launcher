<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667EEA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764BA2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="starGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGradient)" stroke="#5A67D8" stroke-width="1.5"/>
  
  <!-- AI Neural Network Pattern -->
  <g opacity="0.9">
    <!-- Central core -->

    <circle cx="32" cy="32" r="4" fill="#667EEA" opacity="0.8"/>
    
    <!-- Neural nodes -->
    <circle cx="20" cy="20" r="3" fill="#4ECDC4" opacity="0.9"/>
    <circle cx="44" cy="20" r="2.5" fill="#FF6B6B" opacity="0.9"/>
    <circle cx="18" cy="40" r="2.5" fill="#45B7D1" opacity="0.9"/>
    <circle cx="46" cy="44" r="3" fill="#96CEB4" opacity="0.9"/>
    <circle cx="28" cy="48" r="2" fill="#FFEAA7" opacity="0.9"/>
    
    <!-- Connection lines (neural network style) -->

    
    <!-- Small accent nodes -->
    <circle cx="36" cy="18" r="1.5" fill="#FF9FF3" opacity="0.8"/>
    <circle cx="50" cy="32" r="1.5" fill="#54A0FF" opacity="0.8"/>
    <circle cx="14" cy="28" r="1" fill="#FFB347" opacity="0.8"/>
  </g>
  
  <!-- Bigger floating star in top-right (Gemini style) -->
  <g transform="translate(53, 12)">
    <path d="M0,-10 L2.5,-2.5 L10,0 L2.5,2.5 L0,10 L-2.5,2.5 L-10,0 L-2.5,-2.5 Z" 
          fill="url(#starGradient)" 
          opacity="0.95"/>
    <!-- Inner smaller star for sparkle effect -->
    <path d="M0,-5 L1.3,-1.3 L5,0 L1.3,1.3 L0,5 L-1.3,1.3 L-5,0 L-1.3,-1.3 Z" 
          fill="#FFFFFF" 
          opacity="0.95"/>
  </g>
  
  <!-- Additional small sparkles -->
  <circle cx="58" cy="8" r="1.2" fill="#FFD700" opacity="0.7"/>
  <circle cx="56" cy="26" r="0.8" fill="#FFFFFF" opacity="0.6"/>
</svg>
